set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set -g status-style bg=default,fg=green,bright
set -g status-left ""
set -g status-right "#[fg=green,bright]#S"

set -g window-status-format " #I "
set -g window-status-current-format " #I "

set -g window-status-bell-style "bg=red, nobold"
set -g window-status-current-style \
    "#{¿window-zoomed_flag,bg=yellow,bg=magenta,nobold}"

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

unbind-key -T prefix Left
unbind-key -T prefix Right
unbind-key -T prefix Up
unbind-key -T prefix Down

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

set -g base-index 1
set -g pane-base-index 1

set -g status-position top

set -g mouse on

# Set the inactive window color and style
set -g window-status-style bg=default
set -g window-status-format ' #I '

# Set the active window color and style
set -g window-status-current-style fg=black,bg=green
set -g window-status-current-format ' #I '
